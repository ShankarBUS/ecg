<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECGi - Interactive ECG Learning Platform</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0,200,180,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,180,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .app-brand {
            flex-grow: 1;
        }

        .hero {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
            align-items: center;

            .hero-text {
                font-size: 3rem;
                font-weight: 600;
                text-align: center;
            }

            .badge {
                color: var(--c-accent);
                border-color: var(--c-accent-soft);
            }
            .interact {
                background-color: var(--c-border-strong);
                color: var(--c-accent);
            }
            .learn {
                font-weight: 200;
                font-style: italic;
            }

            .hero-description {
                &>span {
                    font-size: var(--fs-2);
                    color: var(--c-text-soft);
                }
            }

            .hero-actions {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                gap: var(--space-2);

                button {
                    padding: var(--space-4) var(--space-6);
                }

                .primary {
                    border-color: var(--c-accent-soft);
                    background-color: var(--c-accent);
                    color: var(--c-bg);

                    &:hover {
                        background-color: var(--c-accent-soft);
                        color: var(--c-text);
                    }

                    &:active {
                        background-color: var(--c-highlight);
                        color: var(--c-text);
                    }
                }
            }
        }

        @media (max-width: 1000px)
        {
            .hero {
                .hero-text {
                    font-size: 2.5rem;
                }
            }
        }

        @media (max-width: 480px)
        {
            .hero {
                .hero-text {
                    font-size: 2rem;
                }
            }
        }
    </style>
</head>

    <header id="header">
        <div class="app-brand">
            <button id="navMenuBtn" class="icon-button" aria-label="Open navigation">
                <svg class="icon">
                    <use href="#ic-menu"></use>
                </svg>
            </button>
            <h3>ECGi</h3>
        </div>
        <div class="button-group">
            <button id="interactBtn" class="icon-button interact-button" title="Interact">
                <svg class="icon">
                    <use xlink:href="#ic-interact"></use>
                </svg>
            </button>
            <button id="learnBtn" class="icon-button learn-button" title="Learn">
                <svg class="icon">
                    <use xlink:href="#ic-learn"></use>
                </svg>
            </button>
        </div>
        <div class="button-group">
            <button id="ghRepoBtn" class="icon-button" title="GitHub Repository">
                <svg class="icon">
                    <use xlink:href="#ic-github"></use>
                </svg>
            </button>
            <button id="ghProfileBtn" class="icon-button" title="ShankarBUS">
                <img class="profile-img" src="https://avatars.githubusercontent.com/ShankarBUS" width="20px"
                    height="20px">
            </button>
        </div>
    </header>

    <main>
        <div class="hero">
            <div class="badge">FREE & OPEN SOURCE</div>
            <div class="hero-text">
                <span class="interact">INTERACT</span>
                <span>&</span>
                <span class="learn">LEARN</span>
            </div>
            <div class="hero-description">
                <span>A free & open source web platform for learning ECG through courses
                    and interactive visuals with no registration.</span>
            </div>
            <div class="hero-actions">
                <button class="primary interact-button">Interact</button>
                <button id="learnBtn2" class="learn-button">Learn</button>
            </div>
        </div>
    </main>

    <footer>
        <p>© ShankarBUS</p>
    </footer>

    <script type="module" src="app.js"></script>
</body>

</html>
